apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-client
  namespace: netbird
  labels:
    app: wg-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-client
  template:
    metadata:
      labels:
        app: wg-client
    spec:
      containers:
      - name: wireguard
        image: linuxserver/wireguard:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: CLIENT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: client_private
        - name: SERVER_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: server_public
        - name: SERVER_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: server_endpoint
        securityContext:
          privileged: true
        volumeMounts:
        - name: config-tpl
          mountPath: /config-tpl
        - name: config
          mountPath: /config
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /config/wg_confs && sed -e 's/\${CLIENT_PRIVATE_KEY}/'"${CLIENT_PRIVATE_KEY}"'/g' -e 's/\${SERVER_PUBLIC_KEY}/'"${SERVER_PUBLIC_KEY}"'/g' -e 's/\${SERVER_ENDPOINT}/'"${SERVER_ENDPOINT}"'/g' /config-tpl/wg0.conf.tpl > /config/wg_confs/wg0.conf
          exec /init
      - name: relay
        image: alpine/socat:1.8.0.1
        command:
        - sh
        - -c
        - |
          socat TCP-LISTEN:9999,fork,reuseaddr TCP:netbird-management.netbird.svc.cluster.local:80 &
          socat TCP-LISTEN:9996,fork,reuseaddr TCP:netbird-management-grpc:33073 &
          socat TCP-LISTEN:9998,fork,reuseaddr TCP:netbird-signal-grpc:10000 &
          socat TCP-LISTEN:9997,fork,reuseaddr TCP:netbird-dashboard.netbird.svc.cluster.local:80 &
          socat UDP-LISTEN:27015,fork,reuseaddr UDP:darkrp-svc.gmod-darkrp-1.svc.cluster.local:27015 &
          socat UDP-LISTEN:27016,fork,reuseaddr UDP:ttt-svc.gmod-ttt-1.svc.cluster.local:27016 &
          socat UDP-LISTEN:27017,fork,reuseaddr UDP:sandbox-svc.gmod-sandbox-1.svc.cluster.local:27017 &
          socat UDP-LISTEN:27018,fork,reuseaddr UDP:starwarsrp-svc.gmod-starwarsrp-1.svc.cluster.local:27018 &
          socat UDP-LISTEN:27019,fork,reuseaddr UDP:cs16-surf-1.cs16-surf-1.svc.cluster.local:27019 &
            socat UDP-LISTEN:27018,fork,reuseaddr,max-children=5 UDP:cs16-4fun-1.cs16-4fun-1.svc.cluster.local:27018 &
          socat UDP-LISTEN:27020,fork,reuseaddr UDP:cs16-4fun-1.cs16-4fun-1.svc.cluster.local:27020 &
          wait
        ports:
        - containerPort: 9999
        - containerPort: 9996
        - containerPort: 9998
        - containerPort: 9997
        - containerPort: 27015
          protocol: UDP
        - containerPort: 27016
          protocol: UDP
        - containerPort: 27017
          protocol: UDP
        - containerPort: 27018
          protocol: UDP
        - containerPort: 27019
          protocol: UDP
        - containerPort: 27020
          protocol: UDP
      volumes:
      - name: config-tpl
        configMap:
          name: wg-client-config
      - name: config
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wg-client-config
  namespace: netbird
data:
  wg0.conf.tpl: |
    [Interface]
    Address = 10.200.200.2/24
    PrivateKey = ${CLIENT_PRIVATE_KEY}
    PostUp = ip link set dev %i mtu 1420; iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
    PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

    [Peer]
    PublicKey = ${SERVER_PUBLIC_KEY}
    Endpoint = ${SERVER_ENDPOINT}:51820
    AllowedIPs = 10.200.200.0/24
    PersistentKeepalive = 25
---
apiVersion: v1
kind: Service
metadata:
  name: wg-relay
  namespace: netbird
spec:
  type: ClusterIP
  selector:
    app: wg-client
  ports:
  - port: 9999
    targetPort: 9999
    name: management
  - port: 9996
    targetPort: 9996
    name: management-grpc
  - port: 9998
    targetPort: 9998
    name: signal
  - port: 9997
    targetPort: 9997
    name: dashboard
  - port: 27015
    targetPort: 27015
    protocol: UDP
    name: gmod-darkrp
  - port: 27016
    targetPort: 27016
    protocol: UDP
    name: gmod-ttt
  - port: 27017
    targetPort: 27017
    protocol: UDP
    name: gmod-sandbox
  - port: 27018
    targetPort: 27018
    protocol: UDP
    name: gmod-starwarsrp
  - port: 27019
    targetPort: 27019
    protocol: UDP
    name: cs16-surf-1
  - port: 27020
    targetPort: 27020
    protocol: UDP
    name: cs16-4fun-1
