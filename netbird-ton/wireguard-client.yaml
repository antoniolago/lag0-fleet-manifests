apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-client
  namespace: netbird
  labels:
    app: wg-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-client
  template:
    metadata:
      labels:
        app: wg-client
    spec:
      containers:
      - name: wireguard
        image: linuxserver/wireguard:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: CLIENT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: client_private
        - name: SERVER_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: server_public
        - name: SERVER_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: server_endpoint
        securityContext:
          privileged: true
        volumeMounts:
        - name: config-tpl
          mountPath: /config-tpl
        - name: config
          mountPath: /config
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /config/wg_confs && sed -e 's/\${CLIENT_PRIVATE_KEY}/'"${CLIENT_PRIVATE_KEY}"'/g' -e 's/\${SERVER_PUBLIC_KEY}/'"${SERVER_PUBLIC_KEY}"'/g' -e 's/\${SERVER_ENDPOINT}/'"${SERVER_ENDPOINT}"'/g' /config-tpl/wg0.conf.tpl > /config/wg_confs/wg0.conf
          exec /init
      - name: relay
        image: alpine/socat:1.8.0.1
        command:
        - sh
        - -c
        - |
          socat TCP-LISTEN:9999,fork,reuseaddr TCP:netbird-management.netbird.svc.cluster.local:80 &
          socat TCP-LISTEN:9998,fork,reuseaddr TCP:netbird-signal.netbird.svc.cluster.local:80 &
          socat TCP-LISTEN:9997,fork,reuseaddr TCP:netbird-dashboard.netbird.svc.cluster.local:80 &
          wait
        ports:
        - containerPort: 9999
        - containerPort: 9998
        - containerPort: 9997
      volumes:
      - name: config-tpl
        configMap:
          name: wg-client-config
      - name: config
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wg-client-config
  namespace: netbird
data:
  wg0.conf.tpl: |
    [Interface]
    Address = 10.200.200.2/24
    PrivateKey = ${CLIENT_PRIVATE_KEY}
    PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT
    PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT

    [Peer]
    PublicKey = ${SERVER_PUBLIC_KEY}
    Endpoint = ${SERVER_ENDPOINT}:51820
    AllowedIPs = 10.200.200.0/24
    PersistentKeepalive = 25
