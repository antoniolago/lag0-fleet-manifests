# This envoy runs as a TCP proxy to forward gRPC traffic through Cloudflare Tunnel
# Cloudflare Tunnel's TCP mode bypasses HTTP header inspection at the edge,
# allowing Content-Type: application/grpc to pass through untouched.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nb-grpc-proxy
  namespace: netbird
  labels:
    app: nb-grpc-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nb-grpc-proxy
  template:
    metadata:
      labels:
        app: nb-grpc-proxy
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.33-latest
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - containerPort: 80
          name: grpc-proxy
        - containerPort: 9901
          name: admin
        volumeMounts:
        - name: config
          mountPath: /etc/envoy
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: nb-grpc-proxy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nb-grpc-proxy-config
  namespace: netbird
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: grpc_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 80
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: grpc_tcp
              cluster: netbird_management
      clusters:
      - name: netbird_management
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        connect_timeout: 5s
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: netbird_management
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: netbird-management
                    port_value: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nb-grpc-proxy
  namespace: netbird
  labels:
    app: nb-grpc-proxy
spec:
  selector:
    app: nb-grpc-proxy
  ports:
  - name: grpc-proxy
    port: 80
    targetPort: 80
    protocol: TCP
