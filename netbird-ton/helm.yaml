apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: netbird
  namespace: netbird
spec:
  interval: 24h
  url: https://netbirdio.github.io/helms
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird
  namespace: netbird
spec:
  releaseName: netbird
  targetNamespace: netbird
  install:
    createNamespace: true
  interval: 30m
  chart:
    spec:
      chart: netbird
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: netbird
      version: 1.9.0
      interval: 12h
  values:
    relay:
      enabled: false
    signal:
      image:
        tag: "0.71.4"
      enabled: true
    management:
      image:
        tag: "0.71.4"
      podCommand:
        args:
          - management
          - --port=80
          - --log-file=console
          - --log-level=info
          - --dns-domain=netbird.lag0.com.br
      configmap: |-
        {
          "Stuns": [
            {
              "Proto": "udp",
              "URI": "stun:stun.l.google.com:19302",
              "Username": "",
              "Password": ""
            }
          ],
          "Signal": {
            "Proto": "http",
            "URI": "wg-relay:9998",
            "Username": "",
            "Password": ""
          },
          "ReverseProxy": {
            "TrustedHTTPProxies": [],
            "TrustedHTTPProxiesCount": 0,
            "TrustedPeers": ["0.0.0.0/0"]
          },
          "Datadir": "/var/lib/netbird/",
          "DataStoreEncryptionKey": "{{ .DATASTORE_ENCRYPTION_KEY }}",
          "StoreConfig": {
            "Engine": "sqlite"
          },
          "HttpConfig": {
            "AuthIssuer": "https://id.lag0.com.br",
            "AuthAudience": "netbird-dashboard",
            "AuthKeysLocation": "https://id.lag0.com.br/.well-known/jwks.json",
            "OIDCConfigEndpoint": "https://id.lag0.com.br/.well-known/openid-configuration"
          },
          "DeviceAuthorizationFlow": {
            "Provider": "hosted",
            "ProviderConfig": {
              "ClientID": "netbird-dashboard",
              "ClientSecret": "",
              "Domain": "netbird.lag0.com.br",
              "Audience": "netbird-dashboard"
            },
            "DeviceAuthEndpoint": "https://id.lag0.com.br/api/oidc/device/authorize"
          },
          "PKCEAuthorizationFlow": {
            "ProviderConfig": {
              "ClientID": "netbird-dashboard",
              "ClientSecret": "",
              "Domain": "netbird.lag0.com.br",
              "Audience": "netbird-dashboard",
              "Scope": "openid profile email groups offline_access",
              "RedirectURLs": ["netbird-app://netbird-app/callback", "http://localhost:53000/"],
              "UseIDToken": false,
              "DisablePromptLogin": false,
              "LoginFlag": 0
            },
            "AuthorizationEndpoint": "https://id.lag0.com.br/authorize",
            "TokenEndpoint": "https://id.lag0.com.br/api/oidc/token"
          },
          "IdpManagerConfig": {
            "ManagerType": "pocketid",
            "ExtraConfig": {
              "ApiToken": "{{ .POCKETID_API_KEY }}",
              "ManagementEndpoint": "https://id.lag0.com.br"
            }
          }
        }
      envFromSecret:
        DATASTORE_ENCRYPTION_KEY: netbird-management/datastoreEncryptionKey
        POCKETID_API_KEY: netbird-management/pocketidApiKey
      persistence:
        enabled: true
        size: 10Mi
    dashboard:
      image:
        tag: "v2.37.1"
      env:
        NETBIRD_MGMT_API_ENDPOINT: "https://netbird.lag0.com.br"
        NETBIRD_MGMT_GRPC_API_ENDPOINT: "https://netbird.lag0.com.br"
        AUTH_CLIENT_ID: "netbird-dashboard"
        AUTH_AUTHORITY: "https://id.lag0.com.br"
        AUTH_AUDIENCE: "none"
        NETBIRD_TOKEN_SOURCE: "id-token"
        USE_AUTH0: "false"
        AUTH_SUPPORTED_SCOPES: "openid profile email groups"
        LETSENCRYPT_DOMAIN: "none"
        NGINX_SSL_PORT: "443"
    ingress:
      management:
        enabled: false
      signal:
        enabled: false
      relay:
        enabled: false
      dashboard:
        enabled: false
