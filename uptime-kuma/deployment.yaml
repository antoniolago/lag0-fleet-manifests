apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: UPTIME_KUMA_PORT
              value: "3001"
            - name: UPTIME_KUMA_HOST
              value: "0.0.0.0"
            # Optional reverse proxy auth — set via secret
            - name: UPTIME_KUMA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma
                  key: UPTIME_KUMA_USERNAME
                  optional: true
            - name: UPTIME_KUMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma
                  key: UPTIME_KUMA_PASSWORD
                  optional: true
            # OIDC — PocketID (supported in Uptime Kuma 1.x+)
            - name: UPTIME_KUMA_OIDC_ISSUER
              value: "https://id.lag0.com.br"
            - name: UPTIME_KUMA_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-oidc
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: UPTIME_KUMA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-oidc
                  key: OIDC_CLIENT_SECRET
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
