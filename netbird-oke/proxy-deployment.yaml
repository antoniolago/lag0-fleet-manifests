apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-management-proxy
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-management
  template:
    metadata:
      labels:
        app: netbird-management
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-conf
        configMap:
          name: netbird-management-proxy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbird-management-proxy-config
  namespace: netbird
data:
  default.conf: |
    server {
        listen 80 http2;
        location /management.ManagementService/ {
            grpc_pass grpc://netbird.lag0.com.br:80;
        }
        location /signalexchange.SignalExchange/ {
            grpc_pass grpc://netbird.lag0.com.br:80;
        }
        location / {
            proxy_pass http://netbird.lag0.com.br:80;
            proxy_set_header Host netbird.lag0.com.br;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_request_headers on;
        }
    }
