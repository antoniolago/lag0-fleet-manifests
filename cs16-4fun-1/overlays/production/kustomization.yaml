apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cs16-4fun-1
resources:
# - configmap-servercfg.yaml
- configmap-image.yaml
- ../../base
replacements:
- source:
    kind: ConfigMap
    name: cs16-surf-image-config
    fieldPath: data.image
  targets:
  - select:
      kind: Deployment
      name: cs16-4fun-1-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=cs16-4fun-1-container].image
    - spec.template.spec.initContainers.[name=sync-maps].image
    options:
      create: true
patches:
- target:
    kind: Deployment
    name: cs16-4fun-1-deployment
  patch: |
    - op: add
      path: /spec/template/spec/containers/0/env
      value:
        - name: PORT
          value: "27018"
        - name: MAX_PLAYERS
          value: "32"
        - name: MAP
          value: "de_dust2"
    - op: replace
      path: /spec/template/spec/containers/0/args/0
      value: "sed -i 's/yb_quota 4/yb_quota 8/;s/bot_quota 0/bot_quota 8/' /home/steam/steamcmd/cs16/cstrike/server.cfg; sed -i 's/yb_quota \"4\"/yb_quota \"8\"/' /home/steam/steamcmd/cs16/cstrike/addons/yapb/conf/yapb.cfg; echo 'setmaster add hl2master.steampowered.com:27011' >> /home/steam/steamcmd/cs16/cstrike/server.cfg; exec /home/steam/steamcmd/cs16/entrypoint.sh"
