// Lag0 CS 1.6 4Fun - Server Config
hostname "Lag0 - 4Fun Server"
sv_tags "comp,128 tick"
sv_region 2
sv_lan 0
sv_cheats 0
sv_pure 0

// Gameplay - normal CS
sv_airaccelerate 10
sv_gravity 800
sv_maxspeed 320
sv_stepsize 18
sv_friction 4
sv_accelerate 5

// Weapons
mp_buytime 90
mp_startmoney 800
mp_roundtime 5
mp_freezetime 5
mp_timelimit 30
mp_c4timer 35
mp_friendlyfire 0
mp_autoteambalance 1
mp_limitteams 1
mp_maxrounds 0
mp_winlimit 0

// Respawn
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1
mp_ignore_round_win_conditions 0
mp_forcerespawn 0

// Bots
bot_quota 10
bot_quota_mode fill
bot_chatter off
bot_join_after_player 0
bot_prefix "[Bot]"
bot_defer_to_human 0

// Rates
sv_maxrate 250000
sv_minrate 50000
sv_maxupdaterate 30
sv_minupdaterate 20
sv_client_max_interp_ratio 0.1
sv_client_predict 1

// Communication
sv_alltalk 0
sv_deadtalk 1
sv_full_alltalk 0

// Security
sv_allow_votes 1
sv_max_queries_sec 6

// RCON
rcon_password admin123

exec banned.cfg
