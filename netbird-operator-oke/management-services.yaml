apiVersion: v1
kind: Service
metadata:
  annotations:
    networking.istio.io/appProtocol: grpc
  name: netbird-management
  namespace: netbird
spec:
  clusterIP: None
  ports:
  - name: grpc
    port: 80
    protocol: TCP
    targetPort: 80
  - name: grpc-backcompat
    port: 33073
    protocol: TCP
    targetPort: 33073
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-signal
  namespace: netbird
spec:
  clusterIP: None
  ports:
  - name: grpc
    port: 80
    protocol: TCP
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
  namespace: netbird
spec:
  clusterIP: None
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
