apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-server
  labels:
    app: wg-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-server
  template:
    metadata:
      labels:
        app: wg-server
    spec:
      containers:
      - name: nftables-ratelimit
        image: alpine:3.20
        securityContext:
          privileged: true
        command:
        - /bin/sh
        - -c
        - |
          apk add -q nftables
          nft add table inet filter
          nft add set inet filter dos_meter '{ type ipv4_addr . inet_proto . inet_service; flags dynamic, timeout; size 65536; }'
          nft add chain inet filter input '{ type filter hook input priority 0; policy accept; }'
          nft add rule inet filter input udp dport { 27015-27100 } add @dos_meter { ip saddr . meta l4proto . udp dport } limit rate 500/second burst 1000 packets accept
          nft add rule inet filter input udp dport { 27015-27100 } log prefix "DDoS-BLOCK" drop
          echo "nftables: rate limit 500/s por IP nas portas 27015-27100"
          sleep infinity
      - name: wireguard
        image: linuxserver/wireguard:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: SERVER_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: server_private
        - name: CLIENT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: client_public
        securityContext:
          privileged: true
        ports:
        - containerPort: 51820
          protocol: UDP
        volumeMounts:
        - name: config-tpl
          mountPath: /config-tpl
        - name: config
          mountPath: /config
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /config/wg_confs && awk '{gsub(/\$\{SERVER_PRIVATE_KEY\}/,ENVIRON["SERVER_PRIVATE_KEY"]); gsub(/\$\{CLIENT_PUBLIC_KEY\}/,ENVIRON["CLIENT_PUBLIC_KEY"]); print}' /config-tpl/wg0.conf.tpl > /config/wg_confs/wg0.conf
          exec /init
      - name: relay
        image: alpine/socat:1.8.0.1
        command:
        - sh
        - -c
        - |
          socat TCP-LISTEN:9999,fork,reuseaddr TCP:10.200.200.2:9999 &
          socat TCP-LISTEN:9996,fork,reuseaddr TCP:10.200.200.2:9996 &
          socat TCP-LISTEN:9998,fork,reuseaddr TCP:10.200.200.2:9998 &
          socat TCP-LISTEN:9997,fork,reuseaddr TCP:10.200.200.2:9997 &
          socat UDP-LISTEN:27015,fork,reuseaddr UDP:10.200.200.2:27015 &
          socat UDP-LISTEN:27016,fork,reuseaddr UDP:10.200.200.2:27016 &
          socat UDP-LISTEN:27017,fork,reuseaddr UDP:10.200.200.2:27017 &
          socat UDP-LISTEN:27018,fork,reuseaddr UDP:10.200.200.2:27018 &
          socat UDP-LISTEN:27019,fork,reuseaddr UDP:10.200.200.2:27019 &
          wait
        ports:
        - containerPort: 9999
        - containerPort: 9996
        - containerPort: 9998
        - containerPort: 9997
        - containerPort: 27015
          protocol: UDP
        - containerPort: 27016
          protocol: UDP
        - containerPort: 27017
          protocol: UDP
        - containerPort: 27018
          protocol: UDP
        - containerPort: 27019
          protocol: UDP
      - name: netbird-relay
        image: netbirdio/relay:0.71.4
        command:
        - /go/bin/netbird-relay
        - --listen-address=:3478
        - --exposed-address=168.75.108.197:3478
        - --auth-secret=$(RELAY_SECRET)
        - --enable-stun
        - --stun-ports=3478
        - --log-level=info
        env:
        - name: RELAY_SECRET
          valueFrom:
            secretKeyRef:
              name: netbird-relay-keys
              key: secret
        ports:
        - containerPort: 3478
          protocol: UDP
        - containerPort: 3478
          protocol: TCP
      volumes:
      - name: config-tpl
        configMap:
          name: wg-server-config
      - name: config
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wg-server-config
data:
  wg0.conf.tpl: |
    [Interface]
    Address = 10.200.200.1/24
    ListenPort = 51820
    PrivateKey = ${SERVER_PRIVATE_KEY}
    PostUp = ip link set dev %i mtu 1280; iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o %i -j MASQUERADE
    PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o %i -j MASQUERADE

    [Peer]
    PublicKey = ${CLIENT_PUBLIC_KEY}
    AllowedIPs = 10.200.200.2/32
    PersistentKeepalive = 25
---
apiVersion: v1
kind: Service
metadata:
  name: wg-server
  annotations:
    oci.oraclecloud.com/load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: wg-server
  ports:
  - port: 51820
    targetPort: 51820
    protocol: UDP
    name: wireguard
  - port: 3478
    targetPort: 3478
    protocol: UDP
    name: relay
  - port: 3478
    targetPort: 3478
    protocol: TCP
    name: relay-tcp
  - port: 27015
    targetPort: 27015
    protocol: UDP
    name: gmod-darkrp
  - port: 27016
    targetPort: 27016
    protocol: UDP
    name: gmod-ttt
  - port: 27017
    targetPort: 27017
    protocol: UDP
    name: gmod-sandbox
  - port: 27018
    targetPort: 27018
    protocol: UDP
    name: gmod-starwarsrp
  - port: 27019
    targetPort: 27019
    protocol: UDP
    name: cs16-surf-1
---
apiVersion: v1
kind: Service
metadata:
  name: wg-relay
spec:
  type: ClusterIP
  selector:
    app: wg-server
  ports:
  - port: 9999
    targetPort: 9999
    name: management
  - port: 9996
    targetPort: 9996
    name: management-grpc
  - port: 9998
    targetPort: 9998
    name: signal
  - port: 9997
    targetPort: 9997
    name: dashboard
