apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-server
  labels:
    app: wg-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-server
  template:
    metadata:
      labels:
        app: wg-server
    spec:
      containers:
      - name: wireguard
        image: linuxserver/wireguard:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: SERVER_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: server_private
        - name: CLIENT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: wireguard-keys
              key: client_public
        securityContext:
          privileged: true
        ports:
        - containerPort: 51820
          protocol: UDP
        volumeMounts:
        - name: config-tpl
          mountPath: /config-tpl
        - name: config
          mountPath: /config
        command:
        - /bin/sh
        - -c
        - |
          envsubst < /config-tpl/wg0.conf.tpl > /config/wg0.conf
          exec /init
      - name: relay
        image: alpine/socat:1.8.0.1
        command:
        - socat
        - TCP-LISTEN:9999,fork,reuseaddr
        - TCP:10.200.200.2:9999
        ports:
        - containerPort: 9999
      volumes:
      - name: config-tpl
        configMap:
          name: wg-server-config
      - name: config
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wg-server-config
data:
  wg0.conf.tpl: |
    [Interface]
    Address = 10.200.200.1/24
    ListenPort = 51820
    PrivateKey = ${SERVER_PRIVATE_KEY}
    PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT
    PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT

    [Peer]
    PublicKey = ${CLIENT_PUBLIC_KEY}
    AllowedIPs = 10.200.200.2/32
    PersistentKeepalive = 25
---
apiVersion: v1
kind: Service
metadata:
  name: wg-server
spec:
  type: LoadBalancer
  selector:
    app: wg-server
  ports:
  - port: 51820
    targetPort: 51820
    protocol: UDP
    name: wireguard
---
apiVersion: v1
kind: Service
metadata:
  name: wg-relay
spec:
  type: ClusterIP
  selector:
    app: wg-server
  ports:
  - port: 9999
    targetPort: 9999
    name: relay
