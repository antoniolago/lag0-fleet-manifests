apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: netbird
  namespace: netbird-operator
spec:
  hosts:
    - nb.lag0.com.br
    - netbird.lag0.com.br
  gateways:
    - istio-system/lag0-gateway
  tcp:
  - match:
    - port: 80
    route:
    - destination:
        host: netbird-management.netbird.svc.cluster.local
        port:
          number: 80
  - match:
    - port: 443
    route:
    - destination:
        host: netbird-management.netbird.svc.cluster.local
        port:
          number: 80
