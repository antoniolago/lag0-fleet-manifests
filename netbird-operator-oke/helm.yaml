apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: netbird
  namespace: netbird-operator
spec:
  interval: 24h
  url: https://netbirdio.github.io/helms
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
  namespace: netbird-operator
spec:
  releaseName: netbird-operator
  targetNamespace: netbird-operator
  install:
    createNamespace: false
  interval: 30m
  chart:
    spec:
      chart: kubernetes-operator
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: netbird-operator
      version: 0.3.1
      interval: 12h
  values:
    cluster:
      name: oke
      dns: svc.cluster.local
    netbirdAPI:
      keyFromSecret:
        name: netbird-operator-api-key
        key: NB_API_KEY
    managementURL: https://nb.lag0.com.br
---
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator-config
  namespace: netbird-operator
spec:
  releaseName: netbird-operator-config
  targetNamespace: netbird-operator
  install:
    createNamespace: false
  interval: 30m
  chart:
    spec:
      chart: netbird-operator-config
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: netbird-operator
      version: 0.1.0
      interval: 12h
  values:
    cluster:
      name: oke
      dns: svc.cluster.local
    router:
      enabled: true
