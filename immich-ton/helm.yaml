apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: immich
  namespace: immich
spec:
  interval: 24h
  url: oci://ghcr.io/immich-app/immich-charts/immich
  ref:
    tag: 0.13.1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  suspend: false
  releaseName: immich-release
  targetNamespace: immich
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: immich
  valuesFrom:
    - kind: Secret
      name: immich-secrets-ton
