apiVersion: v1
kind: Service
metadata:
  name: immich-db
  namespace: immich
  labels:
    app: immich-db
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgresql
  selector:
    app: immich-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-db
  namespace: immich
  labels:
    app: immich-db
spec:
  serviceName: immich-db
  replicas: 1
  selector:
    matchLabels:
      app: immich-db
  template:
    metadata:
      labels:
        app: immich-db
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
      - name: fix-permissions
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          chown 26:999 /var/lib/postgresql/data
          chmod 700 /var/lib/postgresql/data
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgres
        image: tensorchord/cloudnative-vectorchord:16.9-0.4.3
        env:
        - name: POSTGRES_USER
          value: immich
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-secrets-ton
              key: password
        - name: POSTGRES_DB
          value: immich
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - immich
            - -d
            - immich
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - immich
            - -d
            - immich
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: init-sql
        configMap:
          name: immich-db-init
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: large-storage
      resources:
        requests:
          storage: 8Gi
