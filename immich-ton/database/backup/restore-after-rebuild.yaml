apiVersion: batch/v1
kind: Job
metadata:
  name: immich-db-restore-after-rebuild
  namespace: immich
  annotations:
    post-rebuild: "true"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      initContainers:
        - name: download-latest-backup
          image: d3fk/s3cmd
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            - name: S3_BUCKET
              value: "backups"
            - name: S3_PATH
              value: "immich/daily"
            - name: S3_ENDPOINT
              value: "s3.lag0.com.br"
            - name: S3_REGION
              value: "ton-cluster"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /shared
              cat > /root/.s3cfg << CFGEOF
              [default]
              access_key = ${AWS_ACCESS_KEY_ID}
              secret_key = ${AWS_SECRET_ACCESS_KEY}
              host_base = ${S3_ENDPOINT}
              host_bucket = ${S3_ENDPOINT}
              use_https = True
              signature_v2 = False
              bucket_location = ${S3_REGION}
              CFGEOF

              LATEST_BACKUP=$(s3cmd ls s3://$S3_BUCKET/$S3_PATH/ | sort -r | head -n 1 | awk '{print $4}')

              if [ -z "$LATEST_BACKUP" ]; then
                echo "No backup files found! Skipping restore."
                exit 0
              fi

              echo "Latest backup: $LATEST_BACKUP"
              echo $LATEST_BACKUP > /shared/latest_backup_file.txt

              BACKUP_FILENAME=$(basename $LATEST_BACKUP)
              s3cmd get "$LATEST_BACKUP" "/shared/$BACKUP_FILENAME"

              if [ -f "/shared/$BACKUP_FILENAME" ]; then
                echo "Backup downloaded: $BACKUP_FILENAME"
              else
                echo "ERROR: Download failed"
                exit 1
              fi
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      containers:
        - name: restore-database
          image: tensorchord/cloudnative-vectorchord:16.9-0.4.3
          env:
            - name: DB_HOST
              value: "immich-rw.immich.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "immich"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secrets-ton
                  key: password
            - name: DB_NAME
              value: "immich"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PGPASSWORD=$DB_PASSWORD

              echo "Waiting for database to be ready..."
              until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER; do
                echo "Database not ready, waiting..."
                sleep 5
              done

              TABLE_COUNT=$(psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -t -A -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" 2>/dev/null || echo "0")
              if [ "$TABLE_COUNT" -gt "0" ] 2>/dev/null; then
                echo "Database already has $TABLE_COUNT tables. Skipping restore (only runs on empty database)."
                exit 0
              fi
              echo "Database is empty. Proceeding with restore..."

              # Check if backup was downloaded
              if [ ! -f /shared/latest_backup_file.txt ]; then
                echo "No backup to restore. Skipping."
                exit 0
              fi

              BACKUP_FILE=$(cat /shared/latest_backup_file.txt)
              BACKUP_FILENAME=$(basename $BACKUP_FILE)

              if [ ! -f "/shared/$BACKUP_FILENAME" ]; then
                echo "Backup file not found. Skipping."
                exit 0
              fi

              echo "Restoring from: $BACKUP_FILENAME"

              # Fix search_path
              sed -i "s/SELECT pg_catalog.set_config('search_path', '', false);/SELECT pg_catalog.set_config('search_path', 'public, pg_catalog', true);/g" /shared/$BACKUP_FILENAME

              # Drop and recreate
              echo "Dropping and recreating database..."
              psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d postgres -c "DROP DATABASE IF EXISTS $DB_NAME;"
              psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d postgres -c "CREATE DATABASE $DB_NAME OWNER $DB_USER;"

              # Restore
              psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME < /shared/$BACKUP_FILENAME

              echo "Database restore completed!"
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      restartPolicy: Never
      volumes:
        - name: shared-storage
          emptyDir: {}
