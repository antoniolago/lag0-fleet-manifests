apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cs16-surf-1
resources:
# - configmap-servercfg.yaml
- configmap-image.yaml
- ../../base
replacements:
- source:
    kind: ConfigMap
    name: cs16-surf-image-config
    fieldPath: data.image
  targets:
  - select:
      kind: Deployment
      name: cs16-surf-1-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=cs16-surf-1-container].image
    - spec.template.spec.initContainers.[name=sync-maps].image
    options:
      create: true
patches:
- target:
    kind: Deployment
    name: cs16-surf-1-deployment
  patch: |
    - op: add
      path: /spec/template/spec/containers/0/env
      value:
        - name: PORT
          value: "27019"
        - name: MAX_PLAYERS
          value: "16"
        - name: MAP
          value: "Surf_Style_AKS"
    - op: replace
      path: /spec/template/spec/containers/0/args/0
      value: "exec /home/steam/steamcmd/cs16/entrypoint.sh & sleep 30; exec 3<>/dev/udp/127.0.0.1/27019; printf '\\xff\\xff\\xff\\xffchallenge rcon\\x00' >&3; read -r -u 3 -t 5 resp; c=${resp##* }; printf \"\\xff\\xff\\xff\\xffrcon %s admin123 yb_quota 4\\x00\" \"$c\" >&3; read -r -u 3 -t 2; printf \"\\xff\\xff\\xff\\xffrcon %s admin123 yb_reset_quota 1\\x00\" \"$c\" >&3; read -r -u 3 -t 2; exec 3>&-; printf 'Bots configured\\n'; wait"
