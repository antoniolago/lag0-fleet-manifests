apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cs16-surf-1
resources:
# - configmap-servercfg.yaml
- configmap-image.yaml
- ../../base
replacements:
- source:
    kind: ConfigMap
    name: cs16-surf-image-config
    fieldPath: data.image
  targets:
  - select:
      kind: Deployment
      name: cs16-surf-1-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=cs16-surf-1-container].image
    - spec.template.spec.initContainers.[name=sync-maps].image
    options:
      create: true
patches:
- target:
    kind: Deployment
    name: cs16-surf-1-deployment
  patch: |
    - op: add
      path: /spec/template/spec/containers/0/env
      value:
        - name: PORT
          value: "27019"
        - name: MAX_PLAYERS
          value: "16"
        - name: MAP
          value: "Surf_Style_AKS"
    - op: replace
      path: /spec/template/spec/containers/0/args/0
      value: "/home/steam/steamcmd/cs16/entrypoint.sh & sleep 25; python3 -c \"import socket;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(5);s.sendto(bytes([255]*4)+b'challenge rcon\\x00',('127.0.0.1',27019));d=s.recvfrom(4096)[0];c=d[4:].decode().strip().strip('\\x00').split()[-1];s.sendto(bytes([255]*4)+f'rcon {c} admin123 yb_quota 4\\x00'.encode(),('127.0.0.1',27019));s.recvfrom(4096);s.sendto(bytes([255]*4)+f'rcon {c} admin123 yb_reset_quota 1\\x00'.encode(),('127.0.0.1',27019));s.recvfrom(4096);print('Bots set to 4')\" 2>&1; wait"
