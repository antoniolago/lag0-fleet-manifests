apiVersion: v1
kind: ConfigMap
metadata:
  name: rcon-fix
  namespace: cs16-surf-1
data:
  fix-bots.pl: |
    use IO::Socket::INET;
    my $s = IO::Socket::INET->new(PeerAddr => '127.0.0.1:27019', Proto => 'udp') or exit;
    print $s pack('H*', 'ffffffff6368616c6c656e67652072636f6e00');
    alarm 10;
    my $d; eval { $s->recv($d, 4096) };
    if ($d) {
      $d =~ s/.*\n//;
      my $cmd = pack('H*', 'ffffffff72636f6e20') . $d . ' admin123 yb_quota 4';
      print $s $cmd;
      $cmd = pack('H*', 'ffffffff72636f6e20') . $d . ' admin123 yb_reset_quota 1';
      print $s $cmd;
    }
    close $s;
