apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  interval: 24h
  url: https://kubevirt.github.io/kubevirt-helm-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubevirt-operator
  namespace: kubevirt
spec:
  releaseName: kubevirt-operator
  targetNamespace: kubevirt
  install:
    createNamespace: false
  interval: 30m
  chart:
    spec:
      chart: kubevirt-operator
      sourceRef:
        kind: HelmRepository
        name: kubevirt
        namespace: kubevirt
      interval: 12h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  releaseName: kubevirt
  targetNamespace: kubevirt
  dependsOn:
    - name: kubevirt-operator
      namespace: kubevirt
  install:
    createNamespace: false
  interval: 30m
  chart:
    spec:
      chart: kubevirt
      sourceRef:
        kind: HelmRepository
        name: kubevirt
        namespace: kubevirt
      interval: 12h
  values:
    spec:
      configuration:
        developerConfiguration:
          featureGates:
            - GPU
            - HostDevices
