apiVersion: batch/v1
kind: Job
metadata:
  name: db-restore-s3
  namespace: vaultwarden
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: download-dump
          image: d3fk/s3cmd
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: iam-s3-key
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: iam-s3-key
                  key: secret-key
            - name: S3_BUCKET
              value: "db-backups"
            - name: S3_PATH
              value: "vaultwarden/daily"
            - name: S3_ENDPOINT
              value: "https://grkwgmqwtyw9.compat.objectstorage.sa-saopaulo-1.oraclecloud.com"
            - name: S3_REGION
              value: "sa-saopaulo-1"
            - name: DB_NAME
              value: "vaultwarden"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BACKUP_FILE=$(s3cmd --host-bucket=$S3_REGION/$S3_BUCKET --region=$S3_REGION --host=$S3_ENDPOINT ls s3://$S3_BUCKET/$S3_PATH/ 2>/dev/null | sort | tail -1 | awk '{print $4}')
              echo "Downloading latest backup: $BACKUP_FILE"
              s3cmd --host-bucket=$S3_REGION/$S3_BUCKET --region=$S3_REGION --host=$S3_ENDPOINT get -d -v --ssl "$BACKUP_FILE" /shared/backup.sql
              echo "Downloaded: $(wc -l /shared/backup.sql) lines"
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      containers:
        - name: restore
          image: postgres:16-alpine
          env:
            - name: DB_HOST
              value: "vaultwarden-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "vaultwarden"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              value: "vaultwarden"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              export PGPASSWORD=$DB_PASSWORD

              echo "Dropping and recreating database..."
              psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d postgres -c "DROP DATABASE IF EXISTS $DB_NAME;"
              psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d postgres -c "CREATE DATABASE $DB_NAME;"

              echo "Restoring with search_path fix..."
              # Fix search_path in the dump to avoid restore failures
              sed -i "s/SELECT pg_catalog.set_config('search_path', '', false);/SELECT pg_catalog.set_config('search_path', 'public, pg_catalog', true);/g" /shared/backup.sql

              psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME < /shared/backup.sql

              echo "Verifying..."
              echo "Users: $(psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -t -c 'SELECT count(*) FROM users;')"
              echo "Ciphers: $(psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -t -c 'SELECT count(*) FROM ciphers;')"
              echo "Organizations: $(psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -t -c 'SELECT count(*) FROM organizations;')"
              echo "Organization API keys: $(psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -t -c 'SELECT count(*) FROM organization_api_key;')"
              echo "Restore completed!"
      volumes:
        - name: shared-storage
          emptyDir: {}
