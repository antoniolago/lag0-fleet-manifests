---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: signoz
  namespace: signoz
spec:
  hosts:
    - signoz.lag0.com.br
  gateways:
    - istio-system/lag0-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: signoz-signoz-frontend
            port:
              number: 3301
