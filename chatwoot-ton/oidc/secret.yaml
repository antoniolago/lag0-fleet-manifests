# OIDC Credentials Secret
# ⚠️  DO NOT commit with real values!
#
# For production, use one of:
#   - SealedSecrets: kubeseal < secret.yaml > sealed-secret.yaml
#   - SOPS: sops -e secret.yaml > secret.enc.yaml
#   - ExternalSecrets: ExternalSecret CRD pointing to Vault/AWS/etc.
#
# Identity Provider Setup:
#   Redirect URI: https://your-chatwoot.com/auth/oidc/callback
#   Grant Type: Authorization Code
#   PKCE: Enabled (recommended)
apiVersion: v1
kind: Secret
metadata:
  name: chatwoot-oidc-secrets
  namespace: chatwoot
type: Opaque
stringData:
  # Helm values format - merged into HelmRelease values
  values: |
    env:
      ENABLE_OIDC_LOGIN: "true"
      OIDC_DISPLAY_NAME: "SSO"
      OIDC_CLIENT_ID: "chatwoot"
      OIDC_CLIENT_SECRET: "your-client-secret-here"
      OIDC_ISSUER_URL: "https://auth.example.com"

