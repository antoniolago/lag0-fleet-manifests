# OIDC Credentials - add to chatwoot-secrets (vaultwarden-managed)
#
# Pocket ID Application Setup:
#   1. Go to https://id.lag0.com.br => Applications
#   2. Create new application "chatwoot"
#   3. Redirect URI: https://chatwoot.lag0.com.br/auth/oidc/callback
#   4. Grant Type: Authorization Code, PKCE: Enabled
#   5. Scopes: openid email profile
#   6. Copy the Client Secret
#
# Add these to the 'values.yaml' key in the chatwoot-secrets vaultwarden entry:
#
#   env:
#     OIDC_CLIENT_ID: "chatwoot"
#     OIDC_CLIENT_SECRET: "<paste-secret-here>"
#
# Non-sensitive OIDC config (ENABLE_OIDC_LOGIN, OIDC_DISPLAY_NAME, OIDC_ISSUER_URL)
# is set directly in helm.yaml values.
---
apiVersion: v1
kind: Secret
metadata:
  name: chatwoot-oidc-secrets
  namespace: chatwoot
type: Opaque
stringData:
  # NOT USED via valuesFrom anymore.
  # OIDC_CLIENT_ID and OIDC_CLIENT_SECRET go in chatwoot-secrets values.yaml key.
  # This secret is kept for reference only.
  placeholder: "true"
