# OIDC Credentials Secret
# ⚠️  DO NOT commit with real values!
#
# Before applying, create this secret with your Pocket ID credentials:
#
#   Pocket ID Application Setup:
#     1. Go to https://id.lag0.com.br => Applications
#     2. Create new application "chatwoot"
#     3. Redirect URI: https://chatwoot.lag0.com.br/auth/oidc/callback
#     4. Grant Type: Authorization Code
#     5. PKCE: Enabled (recommended)
#     6. Scopes: openid email profile
#     7. Copy the Client Secret
#
# Then create the secret:
#   kubectl create secret generic chatwoot-oidc-secrets \
#     --namespace chatwoot \
#     --from-literal=values='
#   env:
#     ENABLE_OIDC_LOGIN: "true"
#     OIDC_DISPLAY_NAME: "Pocket ID"
#     OIDC_CLIENT_ID: "chatwoot"
#     OIDC_CLIENT_SECRET: "<paste-secret-here>"
#     OIDC_ISSUER_URL: "https://id.lag0.com.br"
#   '
#
# Or use SealedSecrets / ExternalSecrets for GitOps
apiVersion: v1
kind: Secret
metadata:
  name: chatwoot-oidc-secrets
  namespace: chatwoot
type: Opaque
stringData:
  # Helm values format - merged into HelmRelease values
  values: |
    env:
      ENABLE_OIDC_LOGIN: "true"
      OIDC_DISPLAY_NAME: "Pocket ID"
      OIDC_CLIENT_ID: "chatwoot"
      OIDC_CLIENT_SECRET: "your-pocket-id-client-secret-here"
      OIDC_ISSUER_URL: "https://id.lag0.com.br"
