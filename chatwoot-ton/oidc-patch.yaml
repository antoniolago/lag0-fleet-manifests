# Patch HelmRelease to add OIDC extension + Ruby 3.4 compatibility fix
# Uses strategic merge patches with full container spec to preserve fields
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  postRenderers:
    - kustomize:
        patches:
          # Patch web deployment - add initContainer + volumeMounts + volumes
          - target:
              kind: Deployment
              name: chatwoot-web
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: chatwoot-web
              spec:
                template:
                  spec:
                    initContainers:
                      - name: setup-oidc-extension
                        image: busybox:1.36
                        command:
                          - sh
                          - -c
                          - |
                            mkdir -p /custom/config/initializers /custom/app/controllers/custom/devise_overrides /custom/lib
                            cp /oidc-src/false_class_fix.rb /custom/lib/
                            cp /oidc-src/oidc_omniauth.rb /custom/config/initializers/
                            cp /oidc-src/oidc_dashboard_config.rb /custom/config/initializers/
                            cp /oidc-src/omniauth_callbacks_controller.rb /custom/app/controllers/custom/devise_overrides/
                            printf '#!/bin/sh\nexport RUBYOPT=-r/app/custom/lib/false_class_fix\nexec /app/docker/entrypoints/rails.sh\n' > /custom/entrypoint.sh
                            chmod +x /custom/entrypoint.sh
                        volumeMounts:
                          - name: oidc-extension-src
                            mountPath: /oidc-src
                            readOnly: true
                          - name: oidc-extension
                            mountPath: /custom
                    containers:
                      - name: chatwoot-web
                        image: chatwoot/chatwoot:v4.13.0
                        command:
                          - /custom/entrypoint.sh
                        volumeMounts:
                          - name: oidc-extension
                            mountPath: /custom
                          - name: oidc-extension
                            mountPath: /app/custom
                            readOnly: true
                    volumes:
                      - name: oidc-extension-src
                        configMap:
                          name: chatwoot-oidc-extension
                      - name: oidc-extension
                        emptyDir: {}
          # Patch worker deployment
          - target:
              kind: Deployment
              name: chatwoot-worker
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: chatwoot-worker
              spec:
                template:
                  spec:
                    initContainers:
                      - name: setup-oidc-extension
                        image: busybox:1.36
                        command:
                          - sh
                          - -c
                          - |
                            mkdir -p /custom/config/initializers /custom/app/controllers/custom/devise_overrides /custom/lib
                            cp /oidc-src/false_class_fix.rb /custom/lib/
                            cp /oidc-src/oidc_omniauth.rb /custom/config/initializers/
                            cp /oidc-src/oidc_dashboard_config.rb /custom/config/initializers/
                            cp /oidc-src/omniauth_callbacks_controller.rb /custom/app/controllers/custom/devise_overrides/
                            printf '#!/bin/sh\nexport RUBYOPT=-r/app/custom/lib/false_class_fix\nexec /app/docker/entrypoints/rails.sh\n' > /custom/entrypoint.sh
                            chmod +x /custom/entrypoint.sh
                        volumeMounts:
                          - name: oidc-extension-src
                            mountPath: /oidc-src
                            readOnly: true
                          - name: oidc-extension
                            mountPath: /custom
                    containers:
                      - name: chatwoot-worker
                        image: chatwoot/chatwoot:v4.13.0
                        command:
                          - /custom/entrypoint.sh
                        volumeMounts:
                          - name: oidc-extension
                            mountPath: /custom
                          - name: oidc-extension
                            mountPath: /app/custom
                            readOnly: true
                    volumes:
                      - name: oidc-extension-src
                        configMap:
                          name: chatwoot-oidc-extension
                      - name: oidc-extension
                        emptyDir: {}
