# Patch HelmRelease to add OIDC extension
# This uses postRenderers to inject volumes into the rendered manifests
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  # Use postRenderers to patch the deployment with volume mounts
  # OIDC env vars are set inline in helm.yaml (non-sensitive) and
  # in chatwoot-secrets (OIDC_CLIENT_ID, OIDC_CLIENT_SECRET)
  postRenderers:
    - kustomize:
        patches:
          # Patch web deployment
          - target:
              kind: Deployment
              name: chatwoot-web
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: chatwoot-web
              spec:
                template:
                  spec:
                    initContainers:
                      - name: setup-oidc-extension
                        image: busybox:1.36
                        command:
                          - sh
                          - -c
                          - |
                            mkdir -p /custom/config/initializers
                            mkdir -p /custom/app/controllers/custom/devise_overrides
                            cp /oidc-src/oidc_omniauth.rb /custom/config/initializers/
                            cp /oidc-src/oidc_dashboard_config.rb /custom/config/initializers/
                            cp /oidc-src/omniauth_callbacks_controller.rb /custom/app/controllers/custom/devise_overrides/
                        volumeMounts:
                          - name: oidc-extension-src
                            mountPath: /oidc-src
                            readOnly: true
                          - name: oidc-extension
                            mountPath: /custom
                    containers:
                      - name: chatwoot-web
                        volumeMounts:
                          - name: oidc-extension
                            mountPath: /app/custom
                            readOnly: true
                    volumes:
                      - name: oidc-extension-src
                        configMap:
                          name: chatwoot-oidc-extension
                      - name: oidc-extension
                        emptyDir: {}
          # Patch worker deployment
          - target:
              kind: Deployment
              name: chatwoot-worker
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: chatwoot-worker
              spec:
                template:
                  spec:
                    initContainers:
                      - name: setup-oidc-extension
                        image: busybox:1.36
                        command:
                          - sh
                          - -c
                          - |
                            mkdir -p /custom/config/initializers
                            mkdir -p /custom/app/controllers/custom/devise_overrides
                            cp /oidc-src/oidc_omniauth.rb /custom/config/initializers/
                            cp /oidc-src/oidc_dashboard_config.rb /custom/config/initializers/
                            cp /oidc-src/omniauth_callbacks_controller.rb /custom/app/controllers/custom/devise_overrides/
                        volumeMounts:
                          - name: oidc-extension-src
                            mountPath: /oidc-src
                            readOnly: true
                          - name: oidc-extension
                            mountPath: /custom
                    containers:
                      - name: chatwoot-worker
                        volumeMounts:
                          - name: oidc-extension
                            mountPath: /app/custom
                            readOnly: true
                    volumes:
                      - name: oidc-extension-src
                        configMap:
                          name: chatwoot-oidc-extension
                      - name: oidc-extension
                        emptyDir: {}

