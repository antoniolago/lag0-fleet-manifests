# Patch HelmRelease to add OIDC extension
# Uses JSON patches (RFC 6902) for precise modifications
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  # OIDC env vars are set inline in helm.yaml (non-sensitive) and
  # in chatwoot-secrets (OIDC_CLIENT_ID, OIDC_CLIENT_SECRET)
  postRenderers:
    - kustomize:
        patches:
          # Patch web deployment
          - target:
              kind: Deployment
              name: chatwoot-web
            patch: |-
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: setup-oidc-extension
                    image: busybox:1.36
                    command:
                      - sh
                      - -c
                      - |
                        mkdir -p /custom/config/initializers
                        mkdir -p /custom/app/controllers/custom/devise_overrides
                        # Directly into Rails config/initializers so it loads before 01_inject_enterprise_edition_module.rb
                        cp /oidc-src/00_fix_ruby34.rb /app/config/initializers/
                        cp /oidc-src/oidc_omniauth.rb /custom/config/initializers/
                        cp /oidc-src/oidc_dashboard_config.rb /custom/config/initializers/
                        cp /oidc-src/omniauth_callbacks_controller.rb /custom/app/controllers/custom/devise_overrides/
                    volumeMounts:
                      - name: oidc-extension-src
                        mountPath: /oidc-src
                        readOnly: true
                      - name: oidc-extension
                        mountPath: /custom
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: oidc-extension
                  mountPath: /app/custom
                  readOnly: true
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: oidc-extension-src
                  configMap:
                    name: chatwoot-oidc-extension
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: oidc-extension
                  emptyDir: {}
          # Patch worker deployment
          - target:
              kind: Deployment
              name: chatwoot-worker
            patch: |-
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: setup-oidc-extension
                    image: busybox:1.36
                    command:
                      - sh
                      - -c
                      - |
                        mkdir -p /custom/config/initializers
                        mkdir -p /custom/app/controllers/custom/devise_overrides
                        # Directly into Rails config/initializers so it loads before 01_inject_enterprise_edition_module.rb
                        cp /oidc-src/00_fix_ruby34.rb /app/config/initializers/
                        cp /oidc-src/oidc_omniauth.rb /custom/config/initializers/
                        cp /oidc-src/oidc_dashboard_config.rb /custom/config/initializers/
                        cp /oidc-src/omniauth_callbacks_controller.rb /custom/app/controllers/custom/devise_overrides/
                    volumeMounts:
                      - name: oidc-extension-src
                        mountPath: /oidc-src
                        readOnly: true
                      - name: oidc-extension
                        mountPath: /custom
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: oidc-extension
                  mountPath: /app/custom
                  readOnly: true
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: oidc-extension-src
                  configMap:
                    name: chatwoot-oidc-extension
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: oidc-extension
                  emptyDir: {}
