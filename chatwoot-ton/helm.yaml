apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  interval: 24h
  url: https://chatwoot.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  suspend: false
  releaseName: chatwoot
  targetNamespace: chatwoot
  interval: 30m
  chart:
    spec:
      chart: chatwoot
      # version: 0.9.0
      sourceRef:
        kind: HelmRepository
        name: chatwoot
        namespace: chatwoot
      interval: 12h
  values:
    image:
      # Using v4.12.1 which uses Ruby 3.3 (no const_defined? on false bug)
      tag: v4.12.1
    env:
      FRONTEND_URL: "https://chatwoot.lag0.com.br"
      FORCE_SSL: "true"
      INSTALLATION_ENV: helm
      # OIDC SSO via Pocket ID (non-sensitive config)
      ENABLE_OIDC_LOGIN: "true"
      OIDC_DISPLAY_NAME: "Pocket ID"
      OIDC_ISSUER_URL: "https://id.lag0.com.br"
    postgresql:
      enabled: true
      auth:
        database: chatwoot_production
    # Using built-in Redis (sub-chart)
    redis:
      enabled: true
  valuesFrom:
    - kind: Secret
      name: chatwoot-secrets
