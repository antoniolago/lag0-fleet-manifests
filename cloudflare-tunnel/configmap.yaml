apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare-tunnel
data:
  config.yaml: |
    ingress:
      - hostname: "*.lag0.com.br"
        service: https://istio-gateway.istio-system.svc.cluster.local:443
        originServerName: "*.lag0.com.br"
      - service: http_status:404
