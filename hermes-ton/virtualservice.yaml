---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hermes
  namespace: hermes
spec:
  hosts:
    - hermes.lag0.com.br
  gateways:
    - istio-system/lag0-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: open-webui
            port:
              number: 80
