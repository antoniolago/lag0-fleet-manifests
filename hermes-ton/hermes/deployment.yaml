apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      initContainers:
      - name: init-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          # Copy config
          cp /config-source/config.yaml /opt/data/config.yaml
          # Download kubectl
          wget -qO /opt/data/kubectl https://dl.k8s.io/release/v1.36.0/bin/linux/amd64/kubectl
          chmod +x /opt/data/kubectl
          # Generate kubeconfig from in-cluster SA
          read -r KUBE_TOKEN < /var/run/secrets/kubernetes.io/serviceaccount/token
          KUBE_CA=$(base64 -w0 < /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)
          cat > /opt/data/kubeconfig.yaml <<EOF
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority-data: ${KUBE_CA}
              server: https://kubernetes.default.svc
            name: in-cluster
          contexts:
          - context:
              cluster: in-cluster
              user: hermes
            name: hermes
          current-context: hermes
          users:
          - name: hermes
            user:
              token: ${KUBE_TOKEN}
          EOF
        volumeMounts:
        - name: config-source
          mountPath: /config-source
        - name: data
          mountPath: /opt/data
      containers:
      - name: hermes
        image: nousresearch/hermes-agent:v2026.6.19
        args:
        - hermes
        - gateway
        - run
        env:
        # ── API Server ──
        - name: API_SERVER_ENABLED
          value: "true"
        - name: API_SERVER_PORT
          value: "8642"
        - name: API_SERVER_HOST
          value: "0.0.0.0"
        - name: API_SERVER_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: api-server-key
        # ── Provider (DeepSeek) ──
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: deepseek-api-key
        # ── K8s access ──
        - name: KUBECONFIG
          value: /opt/data/kubeconfig.yaml
        - name: PATH
          value: /opt/data:/opt/hermes/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        ports:
        - containerPort: 8642
          name: api
        livenessProbe:
          httpGet:
            path: /health
            port: api
          initialDelaySeconds: 20
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: api
          initialDelaySeconds: 15
          periodSeconds: 15
        volumeMounts:
        - name: data
          mountPath: /opt/data
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: 1000m
            memory: 1Gi
            ephemeral-storage: 2Gi
      volumes:
      - name: config-source
        configMap:
          name: hermes-config
      - name: data
        persistentVolumeClaim:
          claimName: hermes-data
