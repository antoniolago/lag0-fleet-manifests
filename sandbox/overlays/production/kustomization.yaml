apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gmod-sandbox-1
resources:
- configmap-image.yaml
- deployment.yaml
- service.yaml
- pvc.yaml
replacements:
- source:
    kind: ConfigMap
    name: sandbox-image-config
    fieldPath: data.image
  targets:
  - select:
      kind: Deployment
      name: sandbox-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=sandbox-container].image
    options:
      create: true
