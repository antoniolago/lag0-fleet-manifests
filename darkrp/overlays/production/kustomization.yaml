apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gmod-darkrp-1
resources:
- configmap-image.yaml
- deployment.yaml
- service.yaml
- pvc.yaml
replacements:
- source:
    kind: ConfigMap
    name: darkrp-image-config
    fieldPath: data.image
  targets:
  - select:
      kind: Deployment
      name: darkrp-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=darkrp-container].image
    options:
      create: true
