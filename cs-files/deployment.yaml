apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-files
  namespace: cs-files
  labels:
    app: cs-files
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cs-files
  template:
    metadata:
      labels:
        app: cs-files
    spec:
      serviceAccountName: cs-files-sa
      initContainers:
      - name: sync-maps
        image: alpine:3.20
        command:
        - sh
        - -c
        - |
          apk add -qq kubectl
          POD=$(kubectl get pods -n cs16-surf-1 -l app=cs16-surf-1 -o name 2>/dev/null | head -1 | cut -d/ -f2)
          kubectl cp cs16-surf-1/$POD:/home/steam/steamcmd/cs16/cstrike/maps /www/maps --overwrite 2>/dev/null
        volumeMounts:
        - name: maps
          mountPath: /www/maps
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: maps
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: maps
        emptyDir: {}
      - name: nginx-config
        configMap:
          name: cs-files-nginx-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cs-files-sa
  namespace: cs-files
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cs16-surf-pod-reader
  namespace: cs16-surf-1
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cs-files-read-pods
  namespace: cs16-surf-1
subjects:
- kind: ServiceAccount
  name: cs-files-sa
  namespace: cs-files
roleRef:
  kind: Role
  name: cs16-surf-pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: cs-files
  namespace: cs-files
spec:
  selector:
    app: cs-files
  ports:
  - port: 80
    targetPort: 80
