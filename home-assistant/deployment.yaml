apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /config/custom_components
              # Install auth_oidc component if not present
              if [ ! -d /config/custom_components/auth_oidc ]; then
                wget -qO- https://github.com/Bastian-Kuhn/ha-auth-oidc/archive/refs/heads/main.tar.gz | tar xz -C /tmp/
                cp -r /tmp/ha-auth-oidc-main/custom_components/auth_oidc /config/custom_components/
              fi
              # Generate secrets.yaml from env vars
              echo "OIDC_CLIENT_ID: \"${OIDC_CLIENT_ID:-}\"" > /config/secrets.yaml
              echo "OIDC_CLIENT_SECRET: \"${OIDC_CLIENT_SECRET:-}\"" >> /config/secrets.yaml
          env:
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: home-assistant-oidc
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: home-assistant-oidc
                  key: OIDC_CLIENT_SECRET
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable
          ports:
            - containerPort: 8123
              name: http
          env:
            - name: TZ
              value: "America/Sao_Paulo"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: home-assistant-oidc
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: home-assistant-oidc
                  key: OIDC_CLIENT_SECRET
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
