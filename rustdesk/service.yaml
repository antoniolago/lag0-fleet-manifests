apiVersion: v1
kind: Service
metadata:
  name: rustdesk
  namespace: rustdesk
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.88.194
spec:
  type: LoadBalancer
  selector:
    app: rustdesk
  ports:
    - name: nat
      port: 21115
      targetPort: 21115
      protocol: TCP
    - name: id-tcp
      port: 21116
      targetPort: 21116
      protocol: TCP
    - name: id-udp
      port: 21116
      targetPort: 21116
      protocol: UDP
    - name: relay
      port: 21117
      targetPort: 21117
      protocol: TCP
    - name: relay-ws
      port: 21119
      targetPort: 21119
      protocol: TCP
