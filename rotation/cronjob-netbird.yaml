apiVersion: batch/v1
kind: CronJob
metadata:
  name: rotation-netbird
  namespace: rotation
spec:
  schedule: "0 4 1 * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rotation
          restartPolicy: OnFailure
          containers:
            - name: rotate
              image: python:3-alpine
              command:
                - python3
                - /scripts/netbird-rotate.py
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: rotation-netbird
                defaultMode: 0555
