apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  interval: 24h
  url: https://anza-labs.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  releaseName: pocket-id
  targetNamespace: pocket-id
  install:
    createNamespace: true
  interval: 30m
  chart:
    spec:
      chart: pocket-id
      sourceRef:
        kind: HelmRepository
        name: pocket-id
        namespace: pocket-id
      version: 1.7.1
      interval: 12h
  values:
    host: "id.lag0.com.br"
    persistence:
      data:
        enabled: true
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        path: /healthz
        port: http
      timeoutSeconds: 5
    startupProbe:
      httpGet:
        path: /healthz
        port: http
      timeoutSeconds: 5
    ingress:
      enabled: false

