---
apiVersion: v1
kind: Secret
metadata:
  name: paperless
  namespace: paperless
type: Opaque
stringData:
  # Gera um secret key com: python3 -c "import secrets; print(secrets.token_urlsafe(64))"
  PAPERLESS_SECRET_KEY: "changeme-generate-a-random-key-here"
  # PostgreSQL — must match postgres-cluster.yaml
  PAPERLESS_DBNAME: "paperless"
  PAPERLESS_DBUSER: "paperless"
  PAPERLESS_DBPASS: "changeme-paperless-db-password"
