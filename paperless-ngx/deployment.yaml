apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      initContainers:
        - name: init-permissions
          image: busybox
          command:
            - sh
            - -c
            - mkdir -p /data/data /data/media /data/consume /data/export && chown -R 1000:1000 /data
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:2.14.7
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PAPERLESS_URL
              value: "https://paperless.lag0.com.br"
            - name: PAPERLESS_REDIS
              value: "redis://paperless-redis:6379"
            - name: PAPERLESS_DBHOST
              value: "paperless-pg-rw"
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless
                  key: PAPERLESS_SECRET_KEY
            - name: PAPERLESS_DBNAME
              valueFrom:
                secretKeyRef:
                  name: paperless
                  key: PAPERLESS_DBNAME
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless
                  key: PAPERLESS_DBUSER
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless
                  key: PAPERLESS_DBPASS
            - name: PAPERLESS_TIKA_ENABLED
              value: "1"
            - name: PAPERLESS_TIKA_ENDPOINT
              value: "http://paperless-tika:9998"
            - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
              value: "http://paperless-gotenberg:3000"
            - name: PAPERLESS_TIME_ZONE
              value: "America/Sao_Paulo"
            - name: PAPERLESS_OCR_LANGUAGE
              value: "por+eng"
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GID
              value: "1000"
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
              subPath: data
            - name: data
              mountPath: /usr/src/paperless/media
              subPath: media
            - name: data
              mountPath: /usr/src/paperless/consume
              subPath: consume
            - name: data
              mountPath: /usr/src/paperless/export
              subPath: export
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
