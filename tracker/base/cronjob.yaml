apiVersion: batch/v1
kind: CronJob
metadata:
  name: tracker-query
  namespace: tracker
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: query
            image: python:3-slim
            env:
            - name: SERVERS
              value: "10.252.5.190:27019"
            command:
            - /bin/sh
            - -c
            - |
              python3 << 'PYEOF'
              import json, os, socket, struct

              def a2s_info(host, port, timeout=5):
                  sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
                  sock.settimeout(timeout)
                  try:
                      req = bytes([0xFF,0xFF,0xFF,0xFF,0x54,0x53,0x6F,0x75,0x72,0x63,0x65,0x20,0x45,0x6E,0x67,0x69,0x6E,0x65,0x20,0x51,0x75,0x65,0x72,0x79,0x00])
                      sock.sendto(req, (host, port))
                      data = sock.recvfrom(4096)[0]
                  except:
                      return None
                  finally:
                      sock.close()

                  if len(data) < 5 or data[:4] != b'\xFF\xFF\xFF\xFF':
                      return None
                  if data[4] != ord('I'):
                      return None

                  pos = 5
                  info = {}
                  def rstr():
                      nonlocal pos; e = data.find(b'\x00',pos); s = data[pos:e].decode('utf-8','replace') if e>=0 else ''; pos = e+1 if e>=0 else len(data); return s

                  info['protocol'] = data[pos]; pos+=1
                  info['server_name'] = rstr()
                  info['map_name'] = rstr()
                  info['folder'] = rstr()
                  info['game'] = rstr()
                  info['app_id'] = struct.unpack('<H', data[pos:pos+2])[0]; pos+=2
                  info['player_count'] = data[pos]; pos+=1
                  info['max_players'] = data[pos]; pos+=1
                  info['bot_count'] = data[pos]; pos+=1
                  info['server_type'] = chr(data[pos]); pos+=1
                  info['platform'] = chr(data[pos]); pos+=1
                  info['password'] = data[pos]; pos+=1
                  info['vac'] = data[pos]; pos+=1
                  if info['app_id'] == 2400: pos+=4
                  info['version'] = rstr()
                  if pos < len(data):
                      edf = data[pos]; pos+=1
                      if edf & 0x80: pos+=2
                      if edf & 0x10: pos+=8
                      if edf & 0x40: pos+=2
                      if edf & 0x20: pos+=2
                      if edf & 0x01: rstr()
                      if edf & 0x02: rstr()
                  return info

              servers = os.environ.get('SERVERS','').split(',')
              out = '/data'
              for addr in servers:
                  addr = addr.strip()
                  if not addr: continue
                  h,p = addr.rsplit(':',1)
                  p = int(p)
                  f = f'{out}/server-{p}.json'
                  info = a2s_info(h,p)
                  if info:
                      data = {
                          'name': info.get('server_name',''),
                          'map': info.get('map_name',''),
                          'game': info.get('game',''),
                          'players': info.get('player_count',0),
                          'max_players': info.get('max_players',0),
                          'bots': info.get('bot_count',0),
                          'players_list': [],
                          'online': True
                      }
                  else:
                      data = {'online': False}
                  json.dump(data, open(f,'w'))
                  print(f'Written {f} — online={data.get("online",False)}')
              PYEOF
            volumeMounts:
            - name: data
              mountPath: /data
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: tracker-data
