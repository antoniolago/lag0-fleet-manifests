apiVersion: batch/v1
kind: CronJob
metadata:
  name: tracker-query
  namespace: tracker
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: tracker
          containers:
          - name: query
            image: python:3-slim
            env:
            - name: SERVICE
              value: "cs16-surf-1"
            - name: NAMESPACE
              value: "cs16-surf-1"
            - name: PORT
              value: "27019"
            command:
            - /bin/sh
            - -c
            - |
              python3 << 'PYEOF'
              import json, os, socket, struct, urllib.request

              def get_pod_ips(service, ns):
                  """Resolve pod IPs using K8s Endpoints API."""
                  try:
                      tok = open('/var/run/secrets/kubernetes.io/serviceaccount/token').read()
                      ca = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
                      url = f'https://kubernetes.default.svc/api/v1/namespaces/{ns}/endpoints/{service}'
                      req = urllib.request.Request(url, headers={'Authorization': f'Bearer {tok}'})
                      import ssl; ctx = ssl.create_default_context(cafile=ca); ctx.check_hostname = False
                      resp = urllib.request.urlopen(req, context=ctx, timeout=5)
                      data = json.loads(resp.read())
                      ips = []
                      for s in data.get('subsets', []):
                          for a in s.get('addresses', []):
                              if 'ip' in a: ips.append(a['ip'])
                      return ips
                  except Exception as e:
                      print(f'EP error: {e}')
                      return []

              def query_server(host, port, timeout=5):
                  sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
                  sock.settimeout(timeout)
                  try:
                      req = bytes([0xFF]*4 + [0x54]) + b'Source Engine Query\x00'
                      sock.sendto(req, (host, port))
                      data = sock.recvfrom(4096)[0]
                      if data[4] == ord('A'):
                          c = data[5:9]
                          sock.sendto(bytes([0xFF]*4+[0x54])+c+b'Source Engine Query\x00', (host, port))
                          data = sock.recvfrom(4096)[0]
                      if len(data)<5 or data[:4]!=b'\xff\xff\xff\xff' or data[4]!=ord('I'):
                          sock.close(); return None
                      pos=5; info={}
                      def rs():
                          nonlocal pos; e=data.find(b'\x00',pos); s=data[pos:e].decode('latin-1') if e>=0 else ''; pos=e+1 if e>=0 else len(data); return s
                      info['protocol']=data[pos]; pos+=1
                      info['server_name']=rs()
                      info['map_name']=rs()
                      info['folder']=rs()
                      info['game']=rs()
                      info['app_id']=struct.unpack('<H',data[pos:pos+2])[0]; pos+=2
                      info['player_count']=data[pos]; pos+=1
                      info['max_players']=data[pos]; pos+=1
                      info['bot_count']=data[pos]; pos+=1
                      pos+=2; info['password']=data[pos]; pos+=2
                      if info['app_id']==2400: pos+=4
                      info['version']=rs()
                      sock.close(); return info
                  except:
                      try: sock.close()
                      except: pass
                      return None

              svc = os.environ.get('SERVICE','')
              ns = os.environ.get('NAMESPACE','')
              port = int(os.environ.get('PORT','27019'))
              out = '/data'

              ips = get_pod_ips(svc, ns)
              print(f'Resolved pods: {ips}')

              for ip in ips:
                  f = f'{out}/server-{port}.json'
                  info = query_server(ip, port)
                  if info:
                      data = {
                          'name': info.get('server_name',''),
                          'map': info.get('map_name',''),
                          'players': info.get('player_count',0),
                          'max_players': info.get('max_players',0),
                          'online': True
                      }
                  else:
                      data = {'online': False}
                  json.dump(data, open(f,'w'))
                  print(f'{f} — online={data.get("online",False)} via {ip}')
              PYEOF
            volumeMounts:
            - name: data
              mountPath: /data
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: tracker-data
