apiVersion: batch/v1
kind: CronJob
metadata:
  name: tracker-query
  namespace: tracker
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: tracker
          containers:
          - name: query
            image: python:3-slim
            env:
            - name: SERVICE
              value: "cs16-surf-1"
            - name: NAMESPACE
              value: "cs16-surf-1"
            - name: PORT
              value: "27019"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cs16-rcon
                  key: rcon-password
            command:
            - /bin/sh
            - -c
            - |
              python3 << 'PYEOF'
              import json, os, socket, struct, urllib.request

              def get_pod_ips(service, ns):
                  """Resolve pod IPs using K8s Endpoints API."""
                  try:
                      tok = open('/var/run/secrets/kubernetes.io/serviceaccount/token').read()
                      ca = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
                      url = f'https://kubernetes.default.svc/api/v1/namespaces/{ns}/endpoints/{service}'
                      req = urllib.request.Request(url, headers={'Authorization': f'Bearer {tok}'})
                      import ssl; ctx = ssl.create_default_context(cafile=ca); ctx.check_hostname = False
                      resp = urllib.request.urlopen(req, context=ctx, timeout=5)
                      data = json.loads(resp.read())
                      ips = []
                      for s in data.get('subsets', []):
                          for a in s.get('addresses', []):
                              if 'ip' in a: ips.append(a['ip'])
                      return ips
                  except Exception as e:
                      print(f'EP error: {e}')
                      return []

              def query_server(host, port, password, timeout=5):
                  """Query server info via GoldSource RCON."""
                  sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
                  sock.settimeout(timeout)
                  try:
                      # Send RCON command
                      cmd = f'rcon {password} status\x00'
                      sock.sendto(bytes([0xFF]*4) + cmd.encode(), (host, port))
                      data = sock.recvfrom(8192)[0]

                      if len(data) < 5 or data[:4] != b'\xff\xff\xff\xff':
                          sock.close(); return None

                      resp = data[5:].decode('latin-1', errors='replace').strip()
                      return parse_status(resp)
                  except:
                      try: sock.close()
                      except: pass
                      return None

              def parse_status(text):
                  info = {'server_name': '', 'map': '', 'players': 0, 'max_players': 0}
                  for line in text.split('\n'):
                      line = line.strip()
                      if line.startswith('hostname:'):
                          info['server_name'] = line.split(':', 1)[1].strip()
                      elif line.startswith('map') and ':' in line:
                          info['map'] = line.split(':', 1)[1].strip()
                      elif line.startswith('players'):
                          parts = line.split(':')[1].strip().split()
                          if parts:
                              info['players'] = parts[0].strip('(')
                              for i, p in enumerate(parts):
                                  if 'max' in p.lower() and i+1 < len(parts):
                                      info['max_players'] = parts[i+1].strip(')')
                  return info

              svc = os.environ.get('SERVICE','')
              ns = os.environ.get('NAMESPACE','')
              port = int(os.environ.get('PORT','27019'))
              rcon_pw = os.environ.get('RCON_PASSWORD','')
              out = '/data'

              ips = get_pod_ips(svc, ns)
              print(f'Resolved pods: {ips}')

              for ip in ips:
                  f = f'{out}/server-{port}.json'
                  info = query_server(ip, port, rcon_pw)
                  if info:
                      data = {
                          'name': info.get('server_name',''),
                          'map': info.get('map',''),
                          'players': info.get('players',0),
                          'max_players': info.get('max_players',0),
                          'online': True
                      }
                  else:
                      data = {'online': False}
                  json.dump(data, open(f,'w'))
                  print(f'{f} — online={data.get("online",False)} via {ip}')
              PYEOF
            volumeMounts:
            - name: data
              mountPath: /data
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: tracker-data
