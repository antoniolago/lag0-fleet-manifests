apiVersion: v1
kind: ServiceAccount
metadata:
  name: tracker
  namespace: tracker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tracker-endpoints-reader
rules:
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tracker-endpoints-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tracker-endpoints-reader
subjects:
- kind: ServiceAccount
  name: tracker
  namespace: tracker
